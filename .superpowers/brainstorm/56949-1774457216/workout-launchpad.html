<h2>Section 2: The Workout Launchpad</h2>
<p class="subtitle">The hub for starting your session, with or without a structured workout.</p>

<div class="split">
  <!-- Free Ride Hub -->
  <div class="card">
    <div class="mockup-header">HUB: FREE RIDE STATE</div>
    <div class="mockup-body" style="background: #000; padding: 20px; display: flex; flex-direction: column; gap: 20px; height: 350px;">
      <div style="text-align: center; color: #888; font-size: 10px;">NO WORKOUT LOADED</div>
      
      <!-- Sensor Status Grid -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div style="background: #1c1c1e; padding: 10px; border-radius: 8px; border-top: 3px solid #3b82f6;">
          <div style="font-size: 10px; color: #3b82f6;">SET A</div>
          <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">KICKR V5</div>
        </div>
        <div style="background: #1c1c1e; padding: 10px; border-radius: 8px; border: 1px dashed #444; color: #444; font-size: 10px; text-align: center; display: flex; align-items: center; justify-content: center;">
          SET B: EMPTY
        </div>
      </div>

      <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;">
        <button style="background: #22c55e; border: none; padding: 15px 40px; border-radius: 30px; color: #fff; font-size: 18px; font-weight: bold; width: 100%;">START FREE RIDE</button>
        <button style="background: transparent; border: 1px solid #3b82f6; padding: 10px 20px; border-radius: 20px; color: #3b82f6; font-size: 12px; font-weight: bold;">SELECT WORKOUT</button>
      </div>
    </div>
  </div>

  <!-- Loaded Workout Hub -->
  <div class="card">
    <div class="mockup-header">HUB: WORKOUT LOADED</div>
    <div class="mockup-body" style="background: #000; padding: 20px; display: flex; flex-direction: column; gap: 20px; height: 350px;">
      <div style="text-align: center; color: #a855f7; font-size: 10px; font-weight: bold;">PYRAMID INTERVALS (60M)</div>
      
      <!-- Sensor Status Grid -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div style="background: #1c1c1e; padding: 10px; border-radius: 8px; border-top: 3px solid #3b82f6;">
          <div style="font-size: 10px; color: #3b82f6;">SET A</div>
          <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">KICKR V5</div>
        </div>
        <div style="background: #1c1c1e; padding: 10px; border-radius: 8px; border-top: 3px solid #a855f7;">
          <div style="font-size: 10px; color: #a855f7;">SET B</div>
          <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">STAGES L/R</div>
        </div>
      </div>

      <div style="background: #1c1c1e; height: 60px; border-radius: 8px; position: relative; overflow: hidden;">
         <div style="position: absolute; left: 0; bottom: 0; height: 50%; width: 100%; background: #a855f7; opacity: 0.3;"></div>
      </div>

      <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;">
        <button style="background: #a855f7; border: none; padding: 15px 40px; border-radius: 30px; color: #fff; font-size: 18px; font-weight: bold; width: 100%;">START WORKOUT</button>
        <button style="background: transparent; border: 1px solid #ef4444; padding: 8px 16px; border-radius: 20px; color: #ef4444; font-size: 10px; font-weight: bold;">CLEAR WORKOUT</button>
      </div>
    </div>
  </div>
</div>
